opensalestax_commerce.settings:
  type: config_object
  label: 'OpenSalesTax settings'
  mapping:
    api_url:
      type: string
      label: 'Engine API URL'
    api_key:
      type: string
      label: 'API Key (optional)'
    restrict_to_public_ips:
      type: boolean
      label: 'Restrict to public IPs (SSRF defense)'
    cache_ttl_seconds:
      type: integer
      label: 'Cache TTL (seconds)'
    fail_hard:
      type: boolean
      label: 'Fail hard on engine error'
    timeout_seconds:
      type: integer
      label: 'Engine HTTP timeout (seconds)'
