sonar.projectKey=opensalestax-drupal-commerce
sonar.projectName=OpenSalesTax for Drupal Commerce
sonar.projectVersion=0.1.0-alpha.1
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
# Stubs/ contains test-only Drupal core stand-ins; excluded from source analysis.
sonar.exclusions=**/vendor/**,**/build/**,**/coverage*/**,tests/stubs/**
sonar.test.inclusions=tests/src/Unit/**/*Test.php
sonar.host.url=http://10.32.161.205:9000

# --- Rule exclusions (documented) ---
#
# php:S100 — "method names must match ^[a-z][a-z0-9_]*$" (snake_case).
#   This module follows PSR-12 / Drupal coding standard, both of which
#   use camelCase for protected/public method names. The rule's regex
#   is wrong for modern PHP; we exclude it globally for src/.
#
# php:S1142 — "method has more than 3 return statements".
#   Our methods use early-return guard clauses (URL validator,
#   TaxCalculator gates) which read clearer than nested conditionals.
#   This is an acceptable style choice; suppressed globally for src/.
sonar.issue.ignore.multicriteria=php-camelcase,php-early-returns
sonar.issue.ignore.multicriteria.php-camelcase.ruleKey=php:S100
sonar.issue.ignore.multicriteria.php-camelcase.resourceKey=src/**/*.php
sonar.issue.ignore.multicriteria.php-early-returns.ruleKey=php:S1142
sonar.issue.ignore.multicriteria.php-early-returns.resourceKey=src/**/*.php
